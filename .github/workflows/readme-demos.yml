name: README demos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/demos/**
      - scripts/generate-readme-examples.sh
      - .github/workflows/readme-demos.yml
  pull_request:
    paths:
      - docs/demos/**
      - scripts/generate-readme-examples.sh
      - .github/workflows/readme-demos.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  demos:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Install demo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          go install github.com/charmbracelet/freeze@latest
          go install github.com/charmbracelet/vhs@latest
      - name: Generate README examples
        run: bash scripts/generate-readme-examples.sh
      - uses: actions/upload-artifact@v4
        with:
          name: readme-demos
          path: docs/demos/generated/*
