name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Version label for manual release assets
        required: false
        default: dev

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}_${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Package skill release asset
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: ./scripts/package-skill.sh
      - uses: actions/upload-artifact@v4
        with:
          name: burpvalve-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/burpvalve_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            dist/burpvalve_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create aggregate checksums
        run: |
          cd dist
          cat *.tar.gz.sha256 | sort -k2 > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
